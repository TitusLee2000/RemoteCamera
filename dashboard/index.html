<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1020" />
  <title>RemoteCamera Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <header class="app-header" role="banner">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <h1>RemoteCamera</h1>
    </div>
    <div class="conn-indicator" id="conn-indicator" aria-live="polite">
      <span class="conn-dot" aria-hidden="true"></span>
      <span class="conn-text">Connecting…</span>
    </div>
  </header>

  <div id="error-banner" class="banner banner-error" role="alert" hidden>
    <span class="banner-icon" aria-hidden="true">!</span>
    <span class="banner-text">Cannot connect to server. Retrying…</span>
  </div>

  <main id="main" class="main">
    <section class="section-head">
      <h2>Connected Cameras</h2>
      <p id="camera-count" class="muted">0 cameras</p>
    </section>

    <section
      id="camera-grid"
      class="camera-grid"
      aria-label="Connected cameras"
    ></section>

    <section
      id="empty-state"
      class="empty-state"
      hidden
    >
      <div class="empty-icon" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="14" height="12" rx="2"/>
          <path d="m22 8-6 4 6 4z"/>
        </svg>
      </div>
      <h3>No cameras connected yet</h3>
      <p>Open the phone client on a phone to get started.</p>
    </section>
  </main>

  <!-- Camera card template -->
  <template id="camera-card-template">
    <article class="camera-card" data-status="idle">
      <header class="camera-card-head">
        <div class="cam-id">
          <span class="cam-id-label">Camera</span>
          <code class="cam-id-value"></code>
        </div>
        <span class="status-badge" data-status="idle">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-text">Idle</span>
        </span>
      </header>

      <div class="video-wrap">
        <video
          autoplay
          muted
          playsinline
          aria-label="Live video feed"
        ></video>
        <div class="video-overlay" aria-hidden="true">
          <div class="spinner" hidden>
            <span class="spinner-ring"></span>
          </div>
          <div class="video-placeholder">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="6" width="14" height="12" rx="2"/>
              <path d="m22 8-6 4 6 4z"/>
            </svg>
            <span class="placeholder-text">Press View to start stream</span>
          </div>
        </div>
      </div>

      <footer class="camera-card-foot">
        <button type="button" class="btn btn-primary view-btn">
          View
        </button>
        <button type="button" class="btn btn-ghost retry-btn" hidden>
          Retry
        </button>
        <button
          type="button"
          class="btn btn-ghost fullscreen-btn"
          aria-label="Toggle fullscreen"
          title="Fullscreen"
          hidden
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 7V3h4M21 7V3h-4M3 17v4h4M21 17v4h-4"/>
          </svg>
        </button>
      </footer>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
