services:
  - type: web
    name: remotecamera
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: METERED_API_KEY
        sync: false
      - key: METERED_APP_NAME
        sync: false
